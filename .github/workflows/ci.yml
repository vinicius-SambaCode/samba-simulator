name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  backend:
    name: Backend (Python + FastAPI)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: samba_simulator
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d samba_simulator"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: samba_simulator
      DB_HOST: localhost
      DB_PORT: 5432
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/samba_simulator
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/samba_simulator
      BACKEND_CORS_ORIGINS: http://localhost:3000
      STORAGE_DIR: ${{ github.workspace }}/backend/storage
      APP_ENV: test
      LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            poppler-utils \
            libzbar0 \
            libgl1 \
            libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: |
          pytest -vv --maxfail=5 --cov=app --cov-report=xml --cov-report=term-missing

      - name: Lint (ruff)
        run: ruff check . --exit-zero

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    # Só roda se a pasta frontend existir
    if: hashFiles('frontend/package.json') != ''

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build