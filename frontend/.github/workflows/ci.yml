name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  backend:
    name: Backend (Python + FastAPI)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: samba_simulator
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d samba_simulator"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      # espelha .env.sample
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: samba_simulator
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/samba_simulator
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/samba_simulator
      BACKEND_CORS_ORIGINS: http://localhost:3000
      STORAGE_DIR: ${{ github.workspace }}/backend/storage
      APP_ENV: test
      LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # ferramentas de dev
          pip install pytest pytest-cov ruff black

      - name: Alembic migrations
        run: |
          alembic upgrade head

      - name: Run tests (pytest + coverage)
        run: |
          pytest -vv --maxfail=1 --cov=app --cov-report=xml --cov-report=term-missing

      - name: Lint (ruff) and Format check (black)
        run: |
          ruff check .
          black --check .

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: |
          npm ci || npm install

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build