server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Proxy reverso para a API ───────────────────────────────────────────────
    # O frontend chama /api/... e o Nginx repassa para o container samba_api:8000
    # Isso elimina CORS e hardcoded localhost do frontend.
    location /api/ {
        proxy_pass         http://samba_api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Necessário para upload de arquivos grandes (imagens de questões)
        client_max_body_size 50m;
    }

    # ── Arquivos de mídia (PDFs, imagens de questões) ─────────────────────────
    location /media/ {
        proxy_pass       http://samba_api:8000/media/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # ── SPA: redireciona tudo para index.html (client-side routing) ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets com hash no nome
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
