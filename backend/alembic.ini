
# alembic.ini — Configuração do Alembic para SAMBA-Simulator
# Observação importante:
#   - NÃO defina sqlalchemy.url aqui. O env.py lê a URL do backend/.env (settings.DATABASE_URL).
#   - O diretório de scripts de migração é "alembic" (pasta ao lado deste arquivo).

[alembic]
# Caminho para a pasta que contém env.py e a subpasta versions/
script_location = alembic

# (Opcional, mas útil) Garante que o diretório onde está o alembic.ini
# entre no sys.path quando o Alembic rodar. Em setups com env.py já
# ajustando o sys.path, não é estritamente necessário, mas não atrapalha.
prepend_sys_path = .

# Deixe SEM URL aqui. O env.py injeta a URL via settings.DATABASE_URL.
# sqlalchemy.url =

# Separador de caminho para múltiplos diretórios de versões (se um dia usar)
# version_path_separator = os

# Intervalo do timezone para "render_as_batch" em alguns backends (não necessário em Postgres)
# render_as_batch = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# (Opcional) pós-escrita: rodar formatadores de código nas migrações novas
# Requer black/isort instalados no seu venv.
# [post_write_hooks]
# hooks = black,isort
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100
# isort.type = console_scripts
# isort.entrypoint = isort
# isort.options = -l 100
