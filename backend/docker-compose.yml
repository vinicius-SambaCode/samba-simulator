services:
  db:
    image: postgres:15-alpine
    container_name: samba_pg
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - samba_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samba_api
    depends_on:
      - db
    env_file:
      - .env
    environment:
      APP_ENV: development        # <<< garante reload
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - storage:/app/storage
    restart: unless-stopped

volumes:
  samba_pg_data:
  storage:  